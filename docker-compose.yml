services:
  db:
    image: postgres:16
    container_name: todolist-db
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d tododb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: todolist-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Hello To-Do
      DEBUG: "false"
      API_V1_STR: /api/v1
      DATABASE_URL: postgresql+psycopg://todo:todo@db:5432/tododb
      JWT_SECRET_KEY: change-this-secret-key
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  pgdata:
